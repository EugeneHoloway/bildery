<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eugene</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
    }
    .container { padding-left: 64px; }
    h1 { font-size: 1rem; font-weight: 400; color: #111111; letter-spacing: 0.01em; line-height: 1.6; }
    span { display: block; font-size: 0.85rem; font-weight: 400; color: #888888; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello World.</h1>
    <span>I'm Eugene, I am a Product Manager.</span>
  </div>
</body>
</html>
