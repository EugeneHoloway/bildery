<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>Bildery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #111;
    }
    header {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: start;
      padding: 32px 40px;
    }
    .brand h1 { font-size: 0.9rem; font-weight: 500; letter-spacing: -0.01em; }
    .brand p { font-size: 0.78rem; color: #999; margin-top: 4px; }
    .brand p a { color: #999; text-decoration: none; }
    .brand p a:hover { color: #111; }
    nav.main { display: flex; align-items: center; gap: 28px; padding-top: 2px; }
    nav.right { display: flex; justify-content: flex-end; padding-top: 2px; }
    nav a { font-size: 0.82rem; color: #555; text-decoration: none; white-space: nowrap; }
    nav a:hover { color: #111; }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Bildery</h1>
      <p><a href="/about">Eugene Holoway's</a> corner of the web</p>
    </div>
    <nav class="main">
      <a href="/equity">Equity analysis</a>
      <a href="/pm">Product Management</a>
    </nav>
    <nav class="right">
      <a href="/about">About</a>
    </nav>
  </header>
</body>
</html>
